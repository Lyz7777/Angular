<div class="my-2 text-left">
  <button class="btn btn-primary" type="button" routerLink="/clientes/form">
    Crear Cliente
  </button>
</div>

<div class="card border-primary mb-3 mt-3">
  <div class="card-header bg-primary text-white">Clientes</div>
  <div class="card-body">
    <h5 class="card-title text-primary">Listado de clientes</h5>

    <div *ngIf="clientes.length == 0" class="alert alert-info">
      No hay registros en la base de datos!
    </div>

    <table class="table table-bordered table-striped" *ngIf="clientes.length > 0">
      <thead>
        <tr>
          <th>Id</th>
          <th>Nombres</th>
          <th>Apellidos</th>
          <th>Email</th>
          <th>Categoria</th>
          <th>Fecha de creación</th>
          <th>Opciones</th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let cliente of clientes">
          <td>{{ cliente.id }}</td>
          <td>{{ cliente.nombre }}</td>
          <td>{{ cliente.apellido }}</td>
          <td>{{ cliente.email }}</td>
          <td>{{ cliente.objCategoria.nombre || cliente.objCategoria.id }}</td>
          <td>{{ cliente.createAt }}</td>
          <td>
            <button type="button" name="editar" [routerLink]="['/clientes/form', cliente.id]" class="btn btn-warning btn-sm me-2">Editar</button>
            <button type="button" name="eliminar" (click)="delete(cliente)" class="btn btn-danger btn-sm">Eliminar</button>
          </td>
        </tr>
      </tbody>
    </table>
  </div>
</div>
