<ul class="nav nav-tabs bg-success border-0">
  <li class="nav-item">
    <a class="nav-link bg-success text-light border-0" style="font-size: 0.9rem;">
      {{ titulo }}
    </a>
  </li>
</ul>

<div class="card bg-light rounded-0 border-0 mb-5">
  <div class="card-body">
    <form (ngSubmit)="guardar()">
      <div class="form-group row mb-3">
        <label class="col-sm-2 col-form-label">Nombre</label>
        <div class="col-sm-6">
          <input type="text" class="form-control" [(ngModel)]="medico.nombre" name="nombre" required>
        </div>
      </div>

      <div class="form-group row mb-3">
        <label class="col-sm-2 col-form-label">Apellido</label>
        <div class="col-sm-6">
          <input type="text" class="form-control" [(ngModel)]="medico.apellido" name="apellido" required>
        </div>
      </div>

      <div class="form-group row mb-3">
        <label class="col-sm-2 col-form-label">Email</label>
        <div class="col-sm-6">
          <input type="email" class="form-control" [(ngModel)]="medico.email" name="email" required>
        </div>
      </div>

      <div class="form-group row">
        <div class="col-sm-6 d-flex gap-2">
          <button class="btn btn-success btn-sm" type="submit">Guardar</button>
          <button class="btn btn-secondary btn-sm" type="button" routerLink="/medicos">Cancelar</button>
        </div>
      </div>
    </form>
  </div>
</div>
