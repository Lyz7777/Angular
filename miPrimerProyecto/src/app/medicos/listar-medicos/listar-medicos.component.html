<div class="my-2 text-left d-flex gap-2 table-section">
  <button class="btn create-btn" type="button" routerLink="/medicos/form">
    Crear Medico
  </button>
</div>

<div class="card mb-3 mt-3 medicos-card">
  <div class="card-header medicos-header">Medicos</div>
  <div class="card-body">
    <h5 class="card-title medicos-title">Listado de medicos</h5>

    <div *ngIf="medicos.length == 0" class="alert alert-info">
      No hay medicos registrados.
    </div>

    <table class="table table-bordered table-striped medicos-table" *ngIf="medicos.length > 0">
      <thead>
        <tr>
          <th>Id</th>
          <th>Nombre</th>
          <th>Apellido</th>
          <th>Email</th>
          <th>Estado</th>
          <th>Opciones</th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let medico of medicos">
          <td>{{ medico.id }}</td>
          <td>{{ medico.nombre }}</td>
          <td>{{ medico.apellido }}</td>
          <td>{{ medico.email }}</td>
          <td>{{ medico.estado ? 'Activo' : 'Inactivo' }}</td>
          <td>
            <button type="button" class="btn btn-sm me-2 btn-editar" [routerLink]="['/medicos/form', medico.id]">
              Editar
            </button>
            <button type="button" class="btn btn-sm me-2 btn-franjas" [routerLink]="['/medicos', medico.id, 'franjas']">
              Franjas
            </button>
            <button type="button" class="btn btn-sm btn-eliminar" (click)="eliminar(medico)">
              Eliminar
            </button>
          </td>
        </tr>
      </tbody>
    </table>
  </div>
</div>
